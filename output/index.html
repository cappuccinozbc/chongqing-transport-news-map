e": "network", "color": "#2196F3", "size": 3.0}}];
        var map;
        var overlays = [];
        
        // 初始化地图
        function initMap() {
            console.log('初始化地图...');
            // 创建地图实例
            map = new AMap.Map('map', {
                zoom: 11,
                center: [106.55, 29.56],
                viewMode: '2D',
                lang: 'zh_cn'
            });
            
            // 渲染空间特征
            renderMapFeatures();
            
            // 渲染新闻列表
            renderNewsList();
        }
        
        // 等待 AMap 加载完成
        function checkAMap() {
            if (typeof AMap !== 'undefined') {
                initMap();
            } else {
                setTimeout(checkAMap, 100);
            }
        }
        
        // DOM 加载完成后开始检查 AMap
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', checkAMap);
        } else {
            checkAMap();
        }
        
        function renderMapFeatures() {
            console.log('开始渲染地图特征，共', newsData.length, '条');
            newsData.forEach(function(feature) {
                var props = feature.properties;
                
                // 宏观情况不在地图上渲染
                if (props.display_type === 'macro') {
                    return;
                }
                
                var geometry = feature.geometry;
                var style = {
                    strokeColor: props.color,
                    strokeOpacity: 0.8,
                    strokeWeight: props.size * 3,
                    fillColor: props.color,
                    fillOpacity: 0.3
                };
                
                var overlay;
                
                if (geometry.type === 'Point') {
                    var marker = new AMap.Marker(new AMap.LngLat(geometry.coordinates[0], geometry.coordinates[1]), {
                        title: props.title
                    });
                    
                    // 添加信息窗
                    var infoWindow = new AMap.InfoWindow({
                        content: '<div style="padding:10px;"><strong>' + props.title + '</strong><br>' +
                                 '<small>' + props.source + '</small><br><br>' +
                                 props.content + '<br><br>' +
                                 '<span class="tag tag-' + props.category + '">' + props.category + '</span></div>',
                        offset: new AMap.Pixel(0, -30)
                    });
                    
                    marker.on('click', function() {
                        infoWindow.open(map, marker.getPosition());
                    });
                    
                    overlay = marker;
                } else if (geometry.type === 'LineString') {
                    var path = geometry.coordinates.map(function(c) {
                        return new AMap.LngLat(c[0], c[1]);
                    });
                    
                    overlay = new AMap.Polyline(path, style);
                } else if (geometry.type === 'Polygon') {
                    var path = geometry.coordinates[0].map(function(c) {
                        return new AMap.LngLat(c[0], c[1]);
                    });
                    
                    overlay = new AMap.Polygon(path, style);
                } else if (geometry.type === 'MultiLineString') {
                    // MultiLineString创建多条线
                    var group = [];
                    geometry.coordinates.forEach(function(line) {
                        var path = line.map(function(c) {
                            return new AMap.LngLat(c[0], c[1]);
                        });
                        group.push(new AMap.Polyline(path, style));
                    });
                    overlay = group;
                }
                
                if (overlay) {
                    if (Array.isArray(overlay)) {
                        overlay.forEach(function(o) {
                            map.add(o);
                            overlays.push(o);
                        });
                    } else {
                        map.add(overlay);
                        overlays.push(overlay);
                    }
                }
            });
        }
        
        function renderNewsList() {
            console.log('开始渲染新闻列表，共', newsData.length, '条');
            var newsList = document.getElementById('news-list');
            if (!newsList) {
                console.error('未找到 news-list 容器');
                return;
            }
            
            // 显示统计信息
            var statsDiv = document.getElementById('stats');
            if (statsDiv) {
                var macroCount = 0;
                var spatialCount = 0;
                newsData.forEach(function(f) {
                    if (f.properties.display_type === 'macro') {
                        macroCount++;
                    } else {
                        spatialCount++;
                    }
                });
                statsDiv.innerHTML = '<p style="margin-bottom:10px; color:#666; font-size:12px;">共 ' + newsData.length + ' 条新闻 | 空间特征 ' + spatialCount + ' 条 | 宏观情况 ' + macroCount + ' 条</p>';
            }
            
            newsData.forEach(function(feature) {
                var props = feature.properties;
                var item = document.createElement('div');
                item.className = 'news-item' + (props.display_type === 'macro' ? ' macro' : '');
                
                item.innerHTML = 
                    '<h4>' + props.title + '</h4>' +
                    '<p>' + props.content + '</p>' +
                    '<div class="meta">' +
                        '<span class="tag tag-' + props.category + '">' + props.category + '</span>' +
                        '<span class="tag tag-' + props.display_type + '">' + props.display_type + '</span>' +
                        '<br><br>' + props.source.split(' ')[0] + 
                        '<br>' + props.timestamp + 
                    '</div>';
                
                // 非宏观新闻可点击定位
                if (props.display_type !== 'macro') {
                    item.onclick = function() {
                        var geometry = feature.geometry;
                        if (geometry.type === 'Point') {
                            map.setCenter(new AMap.LngLat(geometry.coordinates[0], geometry.coordinates[1]));
                            map.setZoom(14);
                        } else {
                            map.setCenter(new AMap.LngLat(106.55, 29.56));
                            map.setZoom(12);
                        }
                    };
                }
                
                newsList.appendChild(item);
            });
            console.log('新闻列表渲染完成');
        }
    </script>
